name: Quality Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Markdown Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Lint Markdown files
        id: mdlint
        uses: DavidAnson/markdownlint-cli2-action@v22
        with:
          config: '.markdownlint.yaml'

      - name: Post summary
        if: always()
        run: |
          MD_COUNT=$(find . -name '*.md' -not -path './.git/*' | wc -l | tr -d ' ')
          STATUS="${{ steps.mdlint.outcome == 'success' && 'Passed' || 'Failed' }}"
          {
            echo "## Markdown Linting"
            echo ""
            echo "- Files scanned: $MD_COUNT"
            echo "- Status: $STATUS"
          } >> "$GITHUB_STEP_SUMMARY"

  link-checker:
    name: Check Links
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check markdown links
        id: linkcheck
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          config-file: '.markdown-link-check.json'
          use-quiet-mode: 'yes'
        continue-on-error: true

      - name: Post summary
        if: always()
        run: |
          MD_COUNT=$(find . -name '*.md' -not -path './.git/*' | wc -l | tr -d ' ')
          STATUS="${{ steps.linkcheck.outcome == 'success' && 'Passed' || 'Failed' }}"
          {
            echo "## Link Checker"
            echo ""
            echo "- Markdown files scanned: $MD_COUNT"
            echo "- Status: $STATUS (continue-on-error)"
          } >> "$GITHUB_STEP_SUMMARY"

  yaml-lint:
    name: YAML Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Lint YAML files
        id: yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: '.yamllint.yml'

      - name: Post summary
        if: always()
        run: |
          YAML_COUNT=$(find . \( -name '*.yml' -o -name '*.yaml' \) \
            -not -path './.git/*' | wc -l | tr -d ' ')
          STATUS="${{ steps.yamllint.outcome == 'success' && 'Passed' || 'Failed' }}"
          {
            echo "## YAML Validation"
            echo ""
            echo "- Files scanned: $YAML_COUNT"
            echo "- Status: $STATUS"
          } >> "$GITHUB_STEP_SUMMARY"

  html-validate:
    name: HTML Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Validate HTML
        id: htmlhint
        run: htmlhint *.html

      - name: Post summary
        if: always()
        run: |
          HTML_COUNT=$(find . -name '*.html' -not -path './.git/*' | wc -l | tr -d ' ')
          STATUS="${{ steps.htmlhint.outcome == 'success' && 'Passed' || 'Failed' }}"
          {
            echo "## HTML Validation (HTMLHint)"
            echo ""
            echo "- Files scanned: $HTML_COUNT"
            echo "- Status: $STATUS"
          } >> "$GITHUB_STEP_SUMMARY"

  css-lint:
    name: CSS Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Stylelint
        run: npm install -g stylelint stylelint-config-standard

      - name: Lint CSS
        id: stylelint
        run: stylelint "*.css"

      - name: Post summary
        if: always()
        run: |
          CSS_COUNT=$(find . -name '*.css' -not -path './.git/*' | wc -l | tr -d ' ')
          STATUS="${{ steps.stylelint.outcome == 'success' && 'Passed' || 'Failed' }}"
          {
            echo "## CSS Linting (Stylelint)"
            echo ""
            echo "- Files scanned: $CSS_COUNT"
            echo "- Status: $STATUS"
          } >> "$GITHUB_STEP_SUMMARY"

  js-lint:
    name: JavaScript Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install ESLint
        run: npm install -g eslint

      - name: Lint JavaScript
        id: eslint
        run: eslint "*.js"

      - name: Post summary
        if: always()
        run: |
          JS_COUNT=$(find . -name '*.js' -not -path './.git/*' \
            -not -path './node_modules/*' | wc -l | tr -d ' ')
          STATUS="${{ steps.eslint.outcome == 'success' && 'Passed' || 'Failed' }}"
          {
            echo "## JavaScript Linting (ESLint)"
            echo ""
            echo "- Files scanned: $JS_COUNT"
            echo "- Status: $STATUS"
          } >> "$GITHUB_STEP_SUMMARY"

  file-structure:
    name: Validate Repository Structure
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check required files
        id: structure
        run: ${{ github.workspace }}/.github/scripts/validate-structure.sh

      - name: Post summary
        if: always()
        run: |
          STATUS="${{ steps.structure.outcome == 'success' && 'Passed' || 'Failed' }}"
          {
            echo "## Repository Structure"
            echo ""
            echo "- Required files and directories verified"
            echo "- Status: $STATUS"
          } >> "$GITHUB_STEP_SUMMARY"

  readme-quality:
    name: README Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check README content
        id: readme
        run: ${{ github.workspace }}/.github/scripts/check-readme.sh

      - name: Post summary
        if: always()
        run: |
          STATUS="${{ steps.readme.outcome == 'success' && 'Passed' || 'Failed' }}"
          {
            echo "## README Quality"
            echo ""
            echo "- Sections, badges, author, and license checked"
            echo "- Status: $STATUS"
          } >> "$GITHUB_STEP_SUMMARY"

  actions-security:
    name: Actions Security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install zizmor
        env:
          ZIZMOR_VERSION: "1.23.1"
        run: |
          tmpdir="$(mktemp -d)"
          curl -fsL \
            "https://github.com/woodruffw/zizmor/releases/download/v${ZIZMOR_VERSION}/zizmor-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C "$tmpdir"
          sudo mv "$tmpdir/zizmor" /usr/local/bin/zizmor

      - name: Run zizmor
        id: zizmor
        run: zizmor --config zizmor.yml --min-severity low .github/workflows/

      - name: Post summary
        if: always()
        run: |
          WF_COUNT=$(find .github/workflows -name '*.yml' | wc -l | tr -d ' ')
          STATUS="${{ steps.zizmor.outcome == 'success' && 'Passed' || 'Failed' }}"
          {
            echo "## Actions Security (zizmor)"
            echo ""
            echo "- Workflows scanned: $WF_COUNT"
            echo "- Status: $STATUS"
          } >> "$GITHUB_STEP_SUMMARY"

  prose-lint:
    name: Prose Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Vale
        id: vale
        uses: errata-ai/vale-action@v2
        with:
          files: '.'
          vale_flags: '--config=.vale.ini'

      - name: Post summary
        if: always()
        run: |
          MD_COUNT=$(find . -name '*.md' -not -path './.git/*' \
            -not -path './styles/*' | wc -l | tr -d ' ')
          STATUS="${{ steps.vale.outcome == 'success' && 'Passed' || 'Failed' }}"
          {
            echo "## Prose Linting (Vale)"
            echo ""
            echo "- Files scanned: $MD_COUNT"
            echo "- Styles: write-good, proselint"
            echo "- Status: $STATUS"
          } >> "$GITHUB_STEP_SUMMARY"

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Lighthouse
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            index.html
            error.html
          staticDistDir: '.'
          uploadArtifacts: false

      - name: Post summary
        if: always()
        run: ${{ github.workspace }}/.github/scripts/lighthouse-summary.sh

  shell-check:
    name: Shell Script Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run ShellCheck
        id: shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning

      - name: Post summary
        if: always()
        run: |
          SH_COUNT=$(find . -name '*.sh' -not -path './.git/*' | wc -l | tr -d ' ')
          STATUS="${{ steps.shellcheck.outcome == 'success' && 'Passed' || 'Failed' }}"
          {
            echo "## Shell Script Validation (ShellCheck)"
            echo ""
            echo "- Scripts scanned: $SH_COUNT"
            echo "- Status: $STATUS"
          } >> "$GITHUB_STEP_SUMMARY"
