repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-case-conflict
      - id: no-commit-to-branch
        args: ["--branch", "main"]

  # Secrets
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  - repo: local
    hooks:
      - id: gitleaks
        name: gitleaks
        entry: gitleaks git --pre-commit --no-banner --redact
        language: system
        pass_filenames: false

  # Shell scripts
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: shellcheck --severity=warning
        language: system
        types: [shell]
      - id: shellharden
        name: shellharden
        entry: shellharden --check
        language: system
        types: [shell]

  # Web formatting
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: prettier --write --ignore-unknown
        language: system
        types_or: [html, css, javascript, json]

  # HTML
  - repo: local
    hooks:
      - id: htmlhint
        name: htmlhint
        entry: htmlhint
        language: system
        types: [html]

  # CSS
  - repo: local
    hooks:
      - id: stylelint
        name: stylelint
        entry: stylelint --fix
        language: system
        types: [css]

  # JavaScript
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: eslint
        language: system
        types: [javascript]

  # Markdown
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.47.0
    hooks:
      - id: markdownlint
        args: ["--fix"]

  # Prose
  - repo: local
    hooks:
      - id: vale
        name: vale
        entry: bash -c 'vale sync --no-progress 2>/dev/null; vale "$@"' --
        language: system
        types: [markdown]

  # GitHub Actions
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.11
    hooks:
      - id: actionlint

  - repo: local
    hooks:
      - id: zizmor
        name: zizmor
        entry: zizmor --config zizmor.yml
        language: system
        files: \.github/workflows/
        types: [yaml]

  # Commits
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
