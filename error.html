<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Alejandro Garcia</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Plus+Jakarta+Sans:wght@700;800&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "media",
        theme: {
          extend: {
            fontFamily: {
              display: ['"Plus Jakarta Sans"', "sans-serif"],
              body: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="flex min-h-screen items-center justify-center bg-slate-50 font-body text-slate-900 dark:bg-slate-900 dark:text-white"

    <div
      class="absolute left-1/3 top-1/3 h-72 w-72 rounded-full bg-gradient-to-br from-indigo-500 to-purple-500 opacity-15 blur-3xl dark:opacity-10"
    ></div>

    <div class="relative z-10 px-6 text-center">
      <h1
        class="font-display text-6xl font-extrabold text-indigo-500 sm:text-8xl dark:text-indigo-400"
      >
        404
      </h1>
      <p class="mt-4 text-xl text-slate-600 dark:text-slate-400">
        This page wandered off into the cloud.
      </p>
      <p class="mt-2 text-slate-500 dark:text-slate-500">
        Let's get you back to familiar territory.
      </p>
      <a
        href="/index.html"
        class="mt-8 inline-block rounded-lg bg-indigo-500 px-6 py-3 text-sm font-medium text-white shadow-sm transition-all hover:bg-indigo-600 hover:shadow-md focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 focus-visible:ring-offset-2 active:scale-95"
        >Back to Home</a
      >
    </div>
  </body>
</html>
